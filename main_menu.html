<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <link href="main_menu_style.css" rel="stylesheet" >
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">

</head>
<body>
     <div class="header-nav">
        <div class="logo">
            <img src="logo2.png" alt="Experios Logo">
        </div>
        <div class="header-right">
            <div class="header-item">
                <img src="switch.png" alt="connected">
                <span>6 CONNECTED</span>
            </div>
            <div class="header-item">
                <img src="logout.png" alt="logout">
                <span>LOG OUT</span>
            </div>
        </div>
    </div>
    <div class="menu-container">
        <p>Experios presents</p>
        <h1>BLACKEYE'S TREASURE</h1>
        <div class="grid-wrapper">
            <div class="card">
                <div class="circle">
                    <div class="icon1"></div>
                </div>
                 <div class="text"><h1>OUR GAMES</h1></div>
    
            </div>
            <div class="card">
                <div class="circle">
                    <div class="icon2"></div>
                </div>
                <div class="text"><h1>LEADERBOARD</h1></div>
            </div>
            <div class="card">
                <div class="circle">
                    <div class="icon3"></div>
                </div>
                <div class="text"><h1>HOW TO PLAY</h1></div>
            </div>
            <div class="card">
                <div class="circle">
                    <div class="icon4"></div>
                </div>
                <div class="text"><h1>GET STARTED</h1></div>

            </div>
        </div>
    </div>
    
</body>
</html>
